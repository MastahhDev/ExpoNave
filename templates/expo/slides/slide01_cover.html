<section class="slide" id="slide-1">

    <div class="paper">

        <header class="slide-header-top animate fade-up">

            <div class="section-title">
                <span class="section-badge">
                    <i class="bi bi-broadcast"></i>
                    PRESENTACIÓN
                </span>
            </div>

            <div class="slide-page">
                <span id="current-page">1</span> / <span>9</span>
            </div>

        </header>

        <main class="slide-body">

            <div class="hero-art" aria-hidden="true">
                <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">

                    <defs>
                        <radialGradient id="planetGrad" cx="35%" cy="30%" r="75%">
                            <stop offset="0%" stop-color="var(--planet-1)"/>
                            <stop offset="100%" stop-color="var(--planet-2)"/>
                        </radialGradient>
                        <radialGradient id="rockGrad" cx="35%" cy="30%" r="75%">
                            <stop offset="0%" stop-color="var(--rock-1)"/>
                            <stop offset="100%" stop-color="var(--rock-2)"/>
                        </radialGradient>
                        <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#EAF2FF"/>
                            <stop offset="45%" stop-color="var(--space-accent-light)"/>
                            <stop offset="100%" stop-color="var(--space-accent)" stop-opacity="0"/>
                        </linearGradient>
                    </defs>

                    <!-- Planeta -->
                    <circle cx="860" cy="120" r="115" fill="url(#planetGrad)"/>
                    <ellipse cx="815" cy="90" rx="26" ry="14" fill="var(--planet-2)" opacity=".5"/>
                    <ellipse cx="885" cy="150" rx="18" ry="10" fill="var(--planet-2)" opacity=".45"/>
                    <ellipse cx="900" cy="80" rx="14" ry="8" fill="var(--planet-2)" opacity=".4"/>

                    <!-- Asteroide grande (esquina inferior izquierda) -->
                    <path d="M -40,600 C -30,500 60,470 120,510 C 170,540 150,600 130,600 Z"
                          fill="url(#rockGrad)"/>
                    <circle cx="30" cy="555" r="9" fill="var(--rock-2)" opacity=".6"/>
                    <circle cx="80" cy="530" r="6" fill="var(--rock-2)" opacity=".5"/>

                    <!-- Asteroide chico (arriba, cerca del planeta) -->
                    <path d="M 470,55 C 465,35 495,25 515,38 C 532,48 522,68 505,68 C 490,68 475,65 470,55 Z"
                          fill="url(#rockGrad)"/>
                    <circle cx="498" cy="48" r="4" fill="var(--rock-2)" opacity=".6"/>

                    <!-- Asteroide chico 2 (medio derecha) -->
                    <path d="M 770,470 C 765,455 788,445 805,455 C 818,463 810,480 795,480 C 783,480 773,478 770,470 Z"
                          fill="url(#rockGrad)"/>

                    <!-- Estrellas destello -->
                    <g fill="#fff" opacity=".9">
                        <path d="M690,60 L694,72 L706,76 L694,80 L690,92 L686,80 L674,76 L686,72 Z"/>
                        <path d="M200,180 L202,187 L209,189 L202,191 L200,198 L198,191 L191,189 L198,187 Z"/>
                    </g>

                    <!-- Nave -->
                    <g transform="translate(520,340) rotate(-38)">

                        <!-- Llama -->
                        <path d="M -14,90 C -18,150 -6,210 0,250 C 6,210 18,150 14,90 Z"
                              fill="url(#flameGrad)"/>
                        <path d="M -6,90 C -8,130 -3,170 0,195 C 3,170 8,130 6,90 Z"
                              fill="#ffffff" opacity=".85"/>

                        <!-- Aletas -->
                        <path d="M -23,55 L -58,98 L -15,84 Z" fill="#1E2A4A"/>
                        <path d="M 23,55 L 58,98 L 15,84 Z" fill="var(--fin-accent)"/>

                        <!-- Cuerpo -->
                        <path d="M -23,-70 L 23,-70 L 23,80 Q 23,92 12,92 L -12,92 Q -23,92 -23,80 Z"
                              fill="#F4F6FB"/>
                        <rect x="-23" y="20" width="46" height="10" fill="#C9D2E6"/>

                        <!-- Nariz -->
                        <path d="M 0,-140 L 23,-70 Q 0,-55 -23,-70 Z" fill="var(--space-accent)"/>

                        <!-- Ventana -->
                        <circle cx="0" cy="-20" r="15" fill="#1E2A4A"/>
                        <circle cx="0" cy="-20" r="9" fill="var(--space-accent-light)"/>

                    </g>

                </svg>
            </div>

            <div class="hero-copy animate fade-up">

                <h1>Operación<br>Rescate Estelar</h1>

                <p class="hero-subtitle">Simulación del algoritmo de navegación</p>

                <p class="hero-desc">
                    La nave debe recolectar contenedores y administrar su combustible
                    para completar la misión de la forma más eficiente posible.
                </p>

                <div class="hero-dots">
                    <span class="active"></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

        </main>

        <footer class="slide-footer">
            {% include "expo/partials/arrow.html" %}
        </footer>

    </div>

</section>
